version: '3'

services:
  mongo:
    image: mongo
    ports:
      - "27017:27017"

  auth:
    build: ./auth-service
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_HOST=mongo
      - MONGO_PORT=27017

  appointment:
    build: ./appointment-service
    ports:
      - "5001:5001"
    depends_on:
      - mongo
    environment:
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      # Add your SMTP credentials here for email functionality
      # - SMTP_SERVER=smtp.gmail.com
      # - SMTP_PORT=587
      # - SMTP_USERNAME=your-email@gmail.com
      # - SMTP_PASSWORD=your-app-password
      # - FROM_EMAIL=healthcare@example.com

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - auth
      - appointment